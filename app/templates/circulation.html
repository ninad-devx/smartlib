<!DOCTYPE html>
<html>

<head>

<title>Circulation</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="/static/css/style.css">
</head>
{% include "navbar.html" %}

<body>

<div class="container mt-5">

<h2>Borrow Book</h2>

<form id="borrowForm">

<input
id="university_id"
class="form-control mb-2"
placeholder="Student University ID"
required
>

<input
id="book_search"
class="form-control"
placeholder="Search Book Name"
list="book_list"
>

<datalist id="book_list"></datalist>

<input
type="hidden"
id="book_id"
>
<br>
<input
id="borrow_days"
type="number"
class="form-control mb-2"
placeholder="Borrow days"
value="7"
required
>

<button
type="submit"
class="btn btn-success"
>
Borrow Book
</button>

</form>

<hr>

<h2>Return Book</h2>

<form id="returnForm">

<input
id="borrow_id"
class="form-control mb-2"
placeholder="Borrow Record ID"
type="number"
required
>

<button
type="submit"
class="btn btn-warning"
>
Return Book
</button>

</form>

</div>
<footer class="text-center mt-5 mb-3">
SmartLib Ecosystem - RFID Smart Library System
</footer>


<script src="/static/js/circulation.js"></script>
</body>
</html>
