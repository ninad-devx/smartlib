<!DOCTYPE html>
<html>

<head>

<title>Renewals</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">
<link rel="stylesheet" href="/static/css/style.css">
</head>
{% include "navbar.html" %}

<body>

<div class="container mt-5">

<h2>Renewal Requests</h2>

<table class="table table-striped">

<thead>

<tr>

<th>Student</th>
<th>Book</th>
<th>Current Due Date</th>
<th>Action</th>
<th>Requested Days</th>

</tr>

</thead>

<tbody>

{% for renewal, borrow, user, book in requests_list %}

<tr>

<td>{{ user.name }}</td>

<td>{{ book.title }}</td>

<td>{{ borrow.due_date }}</td>

<td>

<button
    class="btn btn-success approve-btn"
    data-renewal-id="{{ renewal.id }}"
>
    Approve
</button>

</td>
<td>
{{ renewal.requested_days }}
</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

<footer class="text-center mt-5 mb-3">
SmartLib Ecosystem - RFID Smart Library System
</footer>
<script>

async function approveRenewal(renewalId){

    const response = await fetch(
        "/api/renew-approve",
        {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                renewal_id: renewalId
            })
        }
    );

    const data = await response.json();

    alert(data.message);

}

document.addEventListener("DOMContentLoaded", () => {

    document.querySelectorAll(".approve-btn").forEach(btn => {

        btn.addEventListener("click", () => {

            approveRenewal(
                btn.dataset.renewalId
            );

        });

    });

});

</script>

</body>
</html>
