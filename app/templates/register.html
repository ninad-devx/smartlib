<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

<link rel="stylesheet" href="/static/css/style.css">

<style>

body{
    min-height:100vh;
}

.register-card{
    max-width:600px;
    width:100%;
    border-radius:15px;
}

@media (max-width:768px){

    .container{
        padding-left:15px;
        padding-right:15px;
    }

    .register-card{
        padding:20px !important;
    }

    h2{
        font-size:1.6rem;
    }

    .form-control,
    .form-select{
        font-size:16px;
        min-height:48px;
    }

    .btn{
        min-height:48px;
        font-size:1rem;
    }
}

</style>

</head>

<body class="bg-light d-flex flex-column">

<div class="container my-4 my-md-5">

    <div class="card shadow-sm mx-auto p-3 p-md-4 register-card">

        <h2 class="text-center mb-4">
            Register
        </h2>

        <form id="registerForm">

            <div class="mb-3">
                <label class="form-label">
                    University ID
                </label>

                <input
                    id="university_id"
                    class="form-control"
                    required
                >
            </div>

            <div class="mb-3">
                <label class="form-label">
                    Name
                </label>

                <input
                    id="name"
                    class="form-control"
                    required
                >
            </div>

            <div class="mb-3">
                <label class="form-label">
                    Email
                </label>

                <input
                    id="email"
                    type="email"
                    class="form-control"
                    required
                >
            </div>

            <div class="mb-3">
                <label class="form-label">
                    Password
                </label>

                <input
                    id="password"
                    type="password"
                    class="form-control"
                    required
                >
            </div>

            <div class="mb-3">
                <label class="form-label">
                    Department
                </label>

                <input
                    id="department"
                    class="form-control"
                    required
                >
            </div>

            <div class="mb-4">

                <label class="form-label">
                    Role
                </label>

                <select
                    id="role"
                    class="form-select"
                >
                    <option value="student">
                        Student
                    </option>

                    <option value="teacher">
                        Teacher
                    </option>
                </select>

            </div>

            <button
                type="submit"
                class="btn btn-success w-100"
            >
                Register
            </button>

        </form>

    </div>

</div>

<footer class="text-center mt-auto mb-3 px-3">
    SmartLib Ecosystem - RFID Smart Library System
</footer>

<script>

document
.getElementById("registerForm")
.addEventListener("submit", async function(e){

    e.preventDefault();

    const submitBtn =
        this.querySelector("button");

    submitBtn.disabled = true;
    submitBtn.innerText = "Registering...";

    try{

        const response = await fetch(
            "/api/auth/register",
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body:JSON.stringify({

                    university_id:
                        document.getElementById("university_id").value.trim(),

                    name:
                        document.getElementById("name").value.trim(),

                    email:
                        document.getElementById("email").value.trim(),

                    password:
                        document.getElementById("password").value,

                    department:
                        document.getElementById("department").value.trim(),

                    role:
                        document.getElementById("role").value

                })
            }
        );

        const data = await response.json();

        if(data.success){

            alert("Registration Successful");

            window.location.href = "/login";

        }else{

            alert(data.message);

        }

    }catch(error){

        alert("Registration failed. Please try again.");

    }finally{

        submitBtn.disabled = false;
        submitBtn.innerText = "Register";

    }

});

</script>

</body>
</html>
