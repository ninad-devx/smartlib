<!DOCTYPE html>
<html>

<head>

<title>Audit Logs</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet"
>
<link rel="stylesheet" href="/static/css/style.css">
</head>
{% include "navbar.html" %}


<body>

<div class="container mt-4">

<h2>Audit Logs</h2>

<table class="table table-striped">

<thead>

<tr>

<th>ID</th>
<th>Action</th>
<th>User ID</th>
<th>Time</th>

</tr>

</thead>

<tbody>

{% for log in logs %}

<tr>

<td>{{ log.id }}</td>

<td>{{ log.action }}</td>

<td>{{ log.performed_by }}</td>

<td>{{ log.timestamp }}</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>
<footer class="text-center mt-5 mb-3">
SmartLib Ecosystem - RFID Smart Library System
</footer>
</body>

</html>
