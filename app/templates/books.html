<!DOCTYPE html>
<html>

<head>
    <title>Books</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div class="container mt-5">

        <h2>Manage Books</h2>

        <hr>

        <h4>Add Book</h4>

        <form id="bookForm">

            <input
                id="isbn"
                class="form-control mb-2"
                placeholder="ISBN"
            >

            <input
                id="title"
                class="form-control mb-2"
                placeholder="Title"
            >

            <input
                id="author"
                class="form-control mb-2"
                placeholder="Author"
            >

            <input
                id="publisher"
                class="form-control mb-2"
                placeholder="Publisher"
            >

            <input
                id="category"
                class="form-control mb-2"
                placeholder="Category"
            >

            <input
                id="shelf_id"
                class="form-control mb-2"
                placeholder="Shelf ID"
            >

            <input
                id="quantity"
                class="form-control mb-2"
                placeholder="Quantity"
                type="number"
            >

            <button
                class="btn btn-success"
                type="submit"
            >
                Add Book
            </button>

        </form>

        <hr>

        <h4>Books</h4>

        <table class="table">

            <thead>
                <tr>
                    <th>ID</th>
                    <th>Title</th>
                    <th>Available</th>
                </tr>
            </thead>

            <tbody id="bookTable">

            </tbody>

        </table>

    </div>

    <script>

    async function loadBooks() {

        const response =
            await fetch("/api/books");

        const books =
            await response.json();

        let html = "";

        books.forEach(book => {

            html += `
            <tr>
                <td>${book.id}</td>
                <td>${book.title}</td>
                <td>${book.available_quantity}</td>
            </tr>
            `;
        });

        document
            .getElementById("bookTable")
            .innerHTML = html;
    }

    loadBooks();

    document
        .getElementById("bookForm")
        .addEventListener("submit", async (e) => {

            e.preventDefault();

            await fetch(
                "/api/books",
                {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({

                        isbn:
                            isbn.value,

                        title:
                            title.value,

                        author:
                            author.value,

                        publisher:
                            publisher.value,

                        category:
                            category.value,

                        shelf_id:
                            parseInt(
                                shelf_id.value
                            ),

                        quantity:
                            parseInt(
                                quantity.value
                            )
                    })
                }
            );

            alert("Book Added");

            loadBooks();

            document
                .getElementById("bookForm")
                .reset();
        });

    </script>

</body>

</html>
