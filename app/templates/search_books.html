<!DOCTYPE html>
<html>
<head>
    <title>Search Books</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">      
</head>
<body>
{% include "navbar.html" %}

<div class="container mt-5">

    <h2>Book Search</h2>

    <input
        id="search"
        class="form-control"
        placeholder="Search book title..."
    >

    <br>

    <button
        class="btn btn-primary"
        onclick="searchBooks()"
    >
        Search
    </button>

    <hr>

    <div id="results"></div>

</div>
<footer class="text-center mt-5 mb-3">
SmartLib Ecosystem - RFID Smart Library System
</footer>
<script>

async function searchBooks(){

    const keyword =
        document.getElementById("search").value;

    const response =
        await fetch(
            `/api/books/search?q=${keyword}`
        );

    const books =
        await response.json();

    let html = "";

    books.forEach(book => {

        html += `
        <div class="card mb-3 p-3">

            <h5>${book.title}</h5>

            <p>
                Author: ${book.author}
            </p>

            <p>
                Shelf: ${book.shelf_code}
            </p>

            <p>
                Available: ${book.available_quantity}
            </p>

        </div>
        `;
    });

    document
        .getElementById("results")
        .innerHTML = html;

}

</script>

</body>
</html>
