<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Search Books</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet" href="/static/css/style.css">

    <style>
        body {
            overflow-x: hidden;
        }

        .book-cover {
            width: 100%;
            max-width: 100px;
            height: 140px;
            object-fit: cover;
        }

        @media (max-width: 768px) {

            h2 {
                font-size: 1.5rem;
                text-align: center;
            }

            .book-cover {
                max-width: 80px;
                height: 120px;
            }

            .card-body {
                padding: 0.75rem;
            }

            .card-title {
                font-size: 1rem;
            }

            .book-meta {
                font-size: 0.9rem;
            }
        }
    </style>
</head>

<body>

{% include "navbar.html" %}

<div class="container py-4">

    <h2 class="mb-4">Book Search</h2>

    <!-- Responsive Search Bar -->
    <div class="row g-2">

        <div class="col-12 col-md-9">
            <input
                id="search"
                class="form-control"
                placeholder="Search book title..."
                onkeypress="if(event.key==='Enter') searchBooks()"
            >
        </div>

        <div class="col-12 col-md-3">
            <button
                class="btn btn-primary w-100"
                onclick="searchBooks()"
            >
                Search
            </button>
        </div>

    </div>

    <hr>

    <div id="results"></div>

</div>

<footer class="text-center mt-4 mb-3 px-3">
    SmartLib Ecosystem - RFID Smart Library System
</footer>

<script>

async function searchBooks() {

    const keyword =
        document.getElementById("search").value.trim();

    if (!keyword) return;

    const response =
        await fetch(`/api/books/search?q=${encodeURIComponent(keyword)}`);

    const books =
        await response.json();

    let html = "";

    if (books.length === 0) {

        html = `
            <div class="alert alert-warning">
                No books found.
            </div>
        `;

    } else {

        books.forEach(book => {

            const image = book.image_url
                ? book.image_url
                : "https://via.placeholder.com/100x140?text=Book";

            html += `
            <div class="card mb-3 shadow-sm">

                <div class="row g-0">

                    <div class="col-4 col-sm-3 col-md-2 text-center p-2">

                        <img
                            src="${image}"
                            class="img-fluid rounded book-cover"
                            alt="${book.title}"
                            onerror="this.src='https://via.placeholder.com/100x140?text=Book'"
                        >

                    </div>

                    <div class="col-8 col-sm-9 col-md-10">

                        <div class="card-body">

                            <h5 class="card-title mb-2">
                                ${book.title}
                            </h5>

                            <p class="mb-1 book-meta">
                                <strong>Author:</strong>
                                ${book.author || "-"}
                            </p>

                            <p class="mb-1 book-meta">
                                <strong>Shelf:</strong>
                                ${book.shelf_code || "-"}
                            </p>

                            <p class="mb-0 book-meta">
                                <strong>Available:</strong>
                                ${book.available_quantity}
                            </p>

                        </div>

                    </div>

                </div>

            </div>
            `;
        });
    }

    document.getElementById("results").innerHTML = html;
}

</script>

</body>
</html>
