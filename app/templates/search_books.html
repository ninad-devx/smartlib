<!DOCTYPE html>
<html>
<head>
    <title>Search Books</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">      
</head>
<body>
{% include "navbar.html" %}

<div class="container mt-5">

    <h2>Book Search</h2>

    <input
        id="search"
        class="form-control"
        placeholder="Search book title..."
    >

    <br>

    <button
        class="btn btn-primary"
        onclick="searchBooks()"
    >
        Search
    </button>

    <hr>

    <div id="results"></div>

</div>
<footer class="text-center mt-5 mb-3">
SmartLib Ecosystem - RFID Smart Library System
</footer>
<script>

async function searchBooks(){

    const keyword =
        document.getElementById("search").value;

    const response =
        await fetch(
            `/api/books/search?q=${keyword}`
        );

    const books =
        await response.json();

    let html = "";

    books.forEach(book => {

    const image = book.image_url
        ? book.image_url
        : "https://via.placeholder.com/100x140?text=Book";

    html += `
    <div class="card mb-3">

        <div class="row g-0">

            <div class="col-md-2 text-center p-2">

                <img
                    src="${image}"
                    class="img-fluid rounded"
                    style="max-height:150px;object-fit:cover;"
                    onerror="this.src='https://via.placeholder.com/100x140?text=Book'"
                >

            </div>

            <div class="col-md-10">

                <div class="card-body">

                    <h5 class="card-title">
                        ${book.title}
                    </h5>

                    <p class="mb-1">
                        <strong>Author:</strong>
                        ${book.author || "-"}
                    </p>

                    <p class="mb-1">
                        <strong>Shelf:</strong>
                        ${book.shelf_code || "-"}
                    </p>

                    <p class="mb-0">
                        <strong>Available:</strong>
                        ${book.available_quantity}
                    </p>

                </div>

            </div>

        </div>

    </div>
    `;
});

    document
        .getElementById("results")
        .innerHTML = html;

}

</script>

</body>
</html>
