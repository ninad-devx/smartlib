<!DOCTYPE html>
<html>

<head>

<title>Attendance</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h2>Attendance Records</h2>

<input
    id="search"
    class="form-control mb-3"
    placeholder="Search Name or Id..."
    onkeyup="filterTable()"
>

<table
class="table table-striped"
id="attendanceTable"
>

<thead>

<tr>
<th>Student ID</th>
<th>Name</th>
<th>Department</th>
<th>Role</th>
<th>Entry</th>
<th>Exit</th>
<th>Minutes</th>
</tr>
</thead>

<tbody>

{% for log, user in records %}

<tr>
<td>{{ user.university_id }}</td>
<td>{{ user.name }}</td>
<td>{{ user.department }}</td>
<td>{{ user.role }}</td>
<td>{{ log.entry_time }}</td>
<td>{{ log.exit_time or "-" }}</td>
<td>{{ log.duration_minutes or "-" }}</td>
</tr>

{% endfor %}

</tbody>

</table>

</div>

<script>

function filterTable(){

    const value =
        document
        .getElementById("search")
        .value
        .toLowerCase();

    const rows =
        document.querySelectorAll(
            "#attendanceTable tbody tr"
        );

    rows.forEach(row=>{

        const text =
            row.innerText.toLowerCase();

        row.style.display =
            text.includes(value)
            ? ""
            : "none";

    });

}

</script>

</body>
</html>
